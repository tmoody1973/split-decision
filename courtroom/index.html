<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split Decision — Courtroom</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage-row">
        <div id="game"></div>
        <aside id="record" aria-label="The Record — live transcript"></aside>
      </div>
      <div id="controls">
        <button id="play" type="button" aria-label="Play or pause">▶</button>
        <input id="seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek" />
        <span id="time" class="time">0:00 / 0:00</span>
        <select id="episode-picker" aria-label="Episode"></select>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
