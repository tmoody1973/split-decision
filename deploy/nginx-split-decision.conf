# Split Decision — courtroom app served from the SAS instance (MOO-226).
#
# Why not OSS static hosting: the OSS default endpoint force-downloads HTML
# (Content-Disposition: attachment, x-oss-force-download: true) for buckets on
# the default domain; the only bypass is a custom domain, which MOO-226 rules
# out of scope. Verified live 2026-07-06 — explicit inline headers are
# overridden. OSS remains podcast/asset storage (RSS enclosures work fine).
#
# Install: cp deploy/nginx-split-decision.conf /etc/nginx/conf.d/split-decision.conf
#          nginx -t && systemctl enable --now nginx && systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    root /opt/split-decision-site;
    index index.html;

    # Pixel app + episode data; everything is static.
    location / {
        try_files $uri $uri/ =404;
    }

    types {
        application/x-ndjson jsonl;
    }

    # Episode audio streams straight from disk; enable range requests (default
    # in nginx) so the player can seek.
    location /episodes/ {
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types text/css application/javascript application/json application/x-ndjson;
}
